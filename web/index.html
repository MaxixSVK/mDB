<!DOCTYPE html>
<html lang="en">

<head>
    <title>mDB | Home</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="mDB - Your new way to track and manage your manga and light novel collection. Open source on Github">
    <meta name="keywords" content="manga, light novel">
    <meta property="og:title" content="mDB | Home" />
    <meta property="og:description"
        content="mDB - Your new way to track and manage your manga and light novel collection. Open source on Github" />
    <meta name="theme-color" content="#131313">
    <link rel="stylesheet" href="/assets/css/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-[#131313] font-figtree min-h-screen flex justify-center">
    <div id="app" class="flex-1 flex flex-col max-w-7xl m-4">
        <nav class="flex justify-between items-center pb-4">
            <a href="/" class="text-3xl text-white font-bold">
                mDB
            </a>
            <div class="flex items-center">
                <input id="search-input" type="text" placeholder="Search..."
                    class="px-4 py-2 rounded-md bg-[#1F1F1F] text-white">
                <img id="pfp" class="ml-2 w-10 h-10 rounded-full cursor-pointer hidden">
                <div id="nopfp" class="mx-4 flex justify-center items-center cursor-pointer">
                    <i class="fas fa-user text-white text-2xl"></i>
                </div>
            </div>
        </nav>
        <main class="bg-[#191818] rounded-md grow">
            <div id="profile-banner">
            </div>
            <div id="stats">
            </div>
            <div id="series-list">
            </div>
            <div id="no-results">
            </div>
            <div id="empty-library">
            </div>
        </main>
    </div>

    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/mdb.js"></script>
</body>

</html>
