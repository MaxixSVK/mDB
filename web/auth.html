<!DOCTYPE html>
<html lang="en">

<head>
    <title>mDB | Auth</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="mDB - Your new way to track and manage your manga and light novel collection. Open source on Github">
    <meta name="keywords" content="manga, light novel">
    <meta property="og:title" content="mDB | Auth" />
    <meta property="og:description"
        content="mDB - Your new way to track and manage your manga and light novel collection. Open source on Github" />
    <meta name="theme-color" content="#131313">
    <link rel="stylesheet" href="assets/css/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-[#131313] font-figtree min-h-screen flex justify-center">
    <div id="app" class="flex-1 flex flex-col max-w-7xl m-4">
        <main class="rounded-md grow">
            <div class="flex flex-col justify-center items-center h-full">
                <section id="login-section"
                    class="bg-[#1F1F1F] rounded-md px-6 pt-6 pb-4 mx-4 text-white w-full max-w-md hidden">
                    <h2 class="text-4xl mb-2 font-bold">Login</h2>
                    <div id="login-error" class="hidden bg-red-500 text-white text-sm p-2 rounded-sm mb-2"></div>
                    <form id="login">
                        <div class="mb-4">
                            <label for="account" class="block text-sm font-medium text-white">Username or Email</label>
                            <input type="text" id="account" name="account"
                                class="mt-1 px-4 py-2 rounded-md bg-[#2A2A2A] text-white w-full" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="block text-sm font-medium text-white">Password</label>
                            <input type="password" id="password" name="password"
                                class="mt-1 px-4 py-2 rounded-md bg-[#2A2A2A] text-white w-full" required>
                        </div>
                        <div class="flex items-center justify-between">
                            <button type="submit"
                                class="w-full border-2 border-dashed border-[#FFA500] text-white font-semibold py-2 px-4 rounded-lg hover:bg-[#FFA500] hover:text-black transition duration-300">Login</button>
                        </div>
                    </form>
                    <div class="mt-4 text-center">
                        <p class="text-white">Don't have an account? <a id="switchToRegister"
                                class="text-[#FFA500] hover:underline">Register</a></p>
                    </div>
                </section>
                <section id="register-section"
                    class="bg-[#1F1F1F] rounded-md px-6 pt-6 pb-4 mx-4 text-white w-full max-w-md hidden">
                    <h2 class="text-4xl mb-2 font-bold">Register</h2>
                    <div id="register-error" class="hidden bg-red-500 text-white text-sm p-2 rounded-sm mb-2"></div>
                    <form id="register">
                        <div class="mb-4">
                            <label for="username" class="block text-sm font-medium text-white">Username</label>
                            <input type="text" id="username" name="username"
                                class="mt-1 px-4 py-2 rounded-md bg-[#2A2A2A] text-white w-full" required>
                        </div>
                        <div class="mb-4">
                            <label for="email" class="block text-sm font-medium text-white">Email</label>
                            <input type="email" id="email" name="email"
                                class="mt-1 px-4 py-2 rounded-md bg-[#2A2A2A] text-white w-full" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="block text-sm font-medium text-white">Password</label>
                            <input type="password" id="password" name="password"
                                class="mt-1 px-4 py-2 rounded-md bg-[#2A2A2A] text-white w-full" required>
                        </div>
                        <div class="mb-4">
                            <label for="forcebetaregistration" class="block text-sm font-medium text-white">Beta
                                registration password</label>
                            <input type="password" id="forcebetaregistration" name="forcebetaregistration"
                                class="mt-1 px-4 py-2 rounded-md bg-[#2A2A2A] text-white w-full" required>
                        </div>
                        <div class="flex items-center justify-between">
                            <button type="submit"
                                class="w-full border-2 border-dashed border-[#FFA500] text-white font-semibold py-2 px-4 rounded-lg hover:bg-[#FFA500] hover:text-black transition duration-300">Register</button>
                        </div>
                    </form>
                    <div class="mt-4 text-center">
                        <p class="text-white mt-2">
                            By registering, you agree to our
                            <a href="/terms-of-service" class="text-[#FFA500] hover:underline">Terms of Service</a> and
                            <a href="/privacy-policy" class="text-[#FFA500] hover:underline">Privacy Policy</a>.
                        </p>
                        <p class="mt-4 text-white">Already have an account? <a id="switchToLogin"
                                class="text-[#FFA500] hover:underline">Login</a></p>
                    </div>
                </section>
                <a href="/about"
                    class="group flex items-center gap-2 text-white transition-colors text-lg font-medium mt-6">
                    <i class="fa-solid fa-arrow-left-long group-hover:-translate-x-1 transition-transform"></i>
                    Back Home
                </a>
            </div>
        </main>
    </div>

    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/auth.js"></script>
</body>

</html>
