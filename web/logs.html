<!DOCTYPE html>
<html lang="en">

<head>
    <title>mDB | Logs</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="mDB - Your new way to track and manage your manga and light novel collection. Open source on Github">
    <meta name="keywords" content="manga, light novel">
    <meta property="og:title" content="mDB | Logs" />
    <meta property="og:description"
        content="mDB - Your new way to track and manage your manga and light novel collection. Open source on Github" />
    <meta name="theme-color" content="#131313">
    <link rel="stylesheet" href="/assets/css/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-[#131313] font-figtree min-h-screen flex justify-center">
    <div id="app" class="flex-1 flex flex-col max-w-7xl m-4">
        <nav class="flex justify-between items-center pb-4 px-4">
            <a href="/" class="text-3xl text-white font-bold">
                mDB
            </a>
            <div>
                <a class="text-3xl text-white font-bold">Logs</a>
            </div>
        </nav>
        <main class="bg-[#191818] rounded-md grow">
            <section
                class="text-white bg-[#1F1F1F] mx-4 mb:mx-8 mb-6 mt-4 p-4 rounded-md flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <img id="pfp" class="w-12 h-12 rounded-full object-cover hidden">
                    <div id="nopfp" class="flex items-center w-12 h-12 bg-[#191818] rounded-full justify-center">
                        <i class="fas fa-user text-white text-lg"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-white font-bold text-sm truncate" id="username"></h3>
                        <p class="text-gray-400 text-xs truncate" id="useremail"></p>
                    </div>
                </div>
                <button id="downloadLogsButton"
                    class="w-full md:w-auto border-2 border-dashed border-[#FFA500] text-white font-semibold py-2 px-4 rounded-lg hover:bg-[#FFA500] hover:text-black transition duration-300">
                    <i class="fas fa-download"></i>
                    <span>Download Logs</span>
                </button>
            </section>
            <section id="logs" class="grow overflow-y-auto"></section>
            <section class="flex justify-center">
                <button id="load-more"
                    class="mx-4 mb-4 w-full border-2 border-dashed border-[#FFA500] text-white font-semibold py-2 px-4 rounded-lg hover:bg-[#FFA500] hover:text-black transition duration-300">Load
                    More</button>
            </section>
        </main>
    </div>

    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/logs.js"></script>
</body>

</html>
